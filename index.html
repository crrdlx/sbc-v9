<!-- version 9.0.0 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Satoshi Bitcoin Converter v9</title>
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <meta name="theme-color" content="#0a0a0c" id="themeColorMeta">
  <meta name="description" content="Convert between Bitcoin, altcoins, satoshis, and fiat currencies like USD, GBP, and more.">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="config.js"></script>
  <script src="src/App.js"></script>
  <script src="src/main.js"></script>
  <script src="src/theme.js"></script>

  <link rel="stylesheet" href="src/style.css">
  <link rel="stylesheet" href="src/theme.css">
  <link rel="stylesheet" href="src/index.css">
</head>

<body onload="init()">
  <header>
    <button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light/dark theme" title="Toggle theme">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <h1><a href="index.html" style="text-decoration:none">シ Satoshi Bitcoin Converter</a></h1>
  </header>

  <main>
    <div class="glass-card" id="mainCard">
      <div class="selector-row">
        <div class="select-group">
          <label>Asset</label>
          <select id="altcoin" onchange="handleCoinChange()">
            <option value="BTC" selected>฿ Bitcoin (BTC)</option>
            <option value="ETH">Ξ Ethereum (ETH)</option>
            <option value="LTC">Ł Litecoin (LTC)</option>
            <option value="XRP">ꭓ Ripple (XRP)</option>
            <option value="SOL">◎ Solana (SOL)</option>
          </select>
          <div class="custom-inputs">
             <input type="text" id="customCoin" placeholder="Ticker (e.g. DOGE)" onchange="handleCoinChange()">
          </div>
        </div>

        <div class="select-group">
          <label>Fiat Currency</label>
          <select id="fiat" onchange="handleCoinChange()">
            <option value="USD" selected>$ USD</option>
            <option value="GBP">£ GBP</option>
            <option value="EUR">€ EUR</option>
            <option value="CAD">C$ CAD</option>
            <option value="AUD">A$ AUD</option>
            <option value="JPY">¥ JPY</option>
          </select>
           <div class="custom-inputs">
             <input type="text" id="customFiat" placeholder="Fiat (e.g. CHF)" onchange="handleCoinChange()">
          </div>
        </div>
      </div>

      <div class="converter-row">
        <label>Crypto Amount <span id="coinLabel" class="unit-badge">BTC</span></label>
        <div class="input-wrapper">
          <span class="symbol-prefix" id="coinSymbolDisplay">฿</span>
          <input type="text" id="input-coin" inputmode="decimal" autocomplete="off" placeholder="0.00">
        </div>
      </div>

      <div class="converter-row">
        <label>Satoshi Equivalent <span class="unit-badge">SATS</span></label>
        <div class="input-wrapper">
          <span class="symbol-prefix">シ</span>
          <input type="text" id="input-sats" inputmode="numeric" autocomplete="off" placeholder="0">
        </div>
      </div>

      <div class="converter-row">
        <label>Fiat Value <span id="fiatLabel" class="unit-badge">USD</span></label>
        <div class="input-wrapper">
          <span class="symbol-prefix" id="fiatSymbolDisplay">$</span>
          <input type="text" id="input-usd" inputmode="decimal" autocomplete="off" placeholder="0.00">
        </div>
      </div>

      <div class="price-ticker">
        <p>Current <span id="tickerName">Bitcoin</span> Price</p>
        <div class="live-price" id="coinPrice">Loading...</div>
        <div>
          <button id="refreshBtn" onclick="forceFetchPrices()" class="refresh-btn" aria-label="Refresh price" title="Refresh Price">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          </button>
        </div>
        <div class="sats-per-dollar" id="satsPerDollar" style="display: none;">-- sats per $1</div>
      </div>
    </div>

    <!-- StatCounter Code -->
    <script type="text/javascript">
      var sc_project = 9064341;
      var sc_invisible = 1;
      var sc_partition = 35;
      var sc_security = "4159c4ae";
    </script>
    <script type="text/javascript" src="https://www.statcounter.com/counter/counter_xhtml.js"></script>
    <noscript>
      <div class="statcounter"><a href="https://www.statcounter.com/" target="_blank"><img class="statcounter"
            src="https://c36.statcounter.com/9064341/0/4159c4ae/1/" alt="hit counter html code"></a></div>
    </noscript>

    <div class="footer-links">
      <a href="pages/about.html">About</a>
      <a href="pages/satoshiday.html">Satoshi Day</a>
      <a href="pages/dev_notes.html">Dev Notes</a>
      <a href="pages/grow.html">Grow</a>
      <a href="pages/tips.html">Tip Jar 😃</a>
    </div>

    <div style="text-align:center; margin-top:2rem; font-size:0.85rem; color:var(--text-muted); font-weight:600;">SBC-v9</div>
  </main>

  <div class="toast" id="toast">Copied!</div>

  <script>
    const state = {
      coin: 'BTC',
      fiat: 'USD',
      priceFiat: 0,
      priceBtc: 1,
      isFetching: false
    };

    const coinSymbols = { BTC: "฿", ETH: "Ξ", LTC: "Ł", XRP: "ꭓ", SOL: "◎", DOGE: "Ð" };
    const fiatSymbols = { USD: "$", GBP: "£", EUR: "€", CAD: "C$", AUD: "A$", INR: "₹", JPY: "¥", KRW: "₩", CHF: "CHF" };

    // UI Elements
    const elements = {
      inputCoin: document.getElementById('input-coin'),
      inputSats: document.getElementById('input-sats'),
      inputUsd: document.getElementById('input-usd'),
      coinPrice: document.getElementById('coinPrice'),
      satsPerDollar: document.getElementById('satsPerDollar'),
      coinLabel: document.getElementById('coinLabel'),
      fiatLabel: document.getElementById('fiatLabel'),
      coinSymbolDisplay: document.getElementById('coinSymbolDisplay'),
      fiatSymbolDisplay: document.getElementById('fiatSymbolDisplay'),
      tickerName: document.getElementById('tickerName'),
      toast: document.getElementById('toast'),
    };

    const parseNum = (str) => {
        if(!str) return 0;
        let cleaned = str.toString().replace(/,/g, '');
        if(cleaned.match(/[a-zA-Z]/)) return 0;
        let val = parseFloat(cleaned);
        return isNaN(val) ? 0 : val;
    };

    const formatNum = (num, decimals) => {
      if(num === 0) return "";
      return new Intl.NumberFormat('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      }).format(num);
    };

    let priceInterval = null;

    window.initSbcUi = function () {
      handleCoinChange();
      setupEventListeners();

      if (priceInterval) clearInterval(priceInterval);
      priceInterval = setInterval(fetchPrices, 60000); // Auto update every 1 minute
    };

    async function forceFetchPrices() {
      const btn = document.getElementById('refreshBtn');
      if (btn) btn.classList.add('spinning');

      await fetchPrices();

      if (btn) btn.classList.remove('spinning');
      if (priceInterval) clearInterval(priceInterval);
      priceInterval = setInterval(fetchPrices, 60000);
    }

    async function fetchPrices() {
      if(state.isFetching) return;
      state.isFetching = true;
      elements.coinPrice.style.opacity = '0.5';

      try {
        const res = await fetch(`https://min-api.cryptocompare.com/data/price?fsym=${state.coin}&tsyms=${state.fiat},BTC`);
        const data = await res.json();

        if (data.Response === "Error") {
          elements.coinPrice.innerText = "API Error";
          return;
        }

        state.priceFiat = parseFloat(data[state.fiat]) || 0;
        state.priceBtc = parseFloat(data["BTC"]) || (state.coin === "BTC" ? 1 : 0);

        elements.coinPrice.innerText = `${fiatSymbols[state.fiat]||''}${formatNum(state.priceFiat, 4)}`;

        // Sats per fiat calculator
        if(state.priceBtc > 0 && state.priceFiat > 0) {
            let oneFiatInCoin = 1 / state.priceFiat;
            let oneFiatInBtc = oneFiatInCoin * state.priceBtc;
            let satsPerFiat = oneFiatInBtc * 100000000;
            elements.satsPerDollar.innerText = `${Math.round(satsPerFiat).toLocaleString()} sats per ${fiatSymbols[state.fiat]||''}1`;
            elements.satsPerDollar.style.display = 'block';
        } else {
            elements.satsPerDollar.style.display = 'none';
        }

        recalculateFrom('coin');
      } catch (err) {
        console.error(err);
        elements.coinPrice.innerText = "Network Error";
      } finally {
        state.isFetching = false;
        elements.coinPrice.style.opacity = '1';
      }
    }

    function handleCoinChange() {
      const customCoin = document.getElementById('customCoin').value.trim().toUpperCase();
      const customFiat = document.getElementById('customFiat').value.trim().toUpperCase();

      state.coin = customCoin || document.getElementById('altcoin').value;
      state.fiat = customFiat || document.getElementById('fiat').value;

      document.getElementById('customCoin').value = customCoin;
      document.getElementById('customFiat').value = customFiat;

      elements.coinLabel.innerText = state.coin;
      elements.fiatLabel.innerText = state.fiat;
      elements.coinSymbolDisplay.innerText = coinSymbols[state.coin] || '';
      elements.fiatSymbolDisplay.innerText = fiatSymbols[state.fiat] || '';
      elements.tickerName.innerText = state.coin;

      // Update theme colors (gray cypherpunk accents per asset)
      const root = document.documentElement;
      const isLight = root.getAttribute('data-theme') === 'light';
      if (state.coin === 'ETH') {
        root.style.setProperty('--accent', isLight ? '#6d28d9' : '#a78bfa');
        root.style.setProperty('--accent-glow', isLight ? 'rgba(109, 40, 217, 0.25)' : 'rgba(167, 139, 250, 0.35)');
        root.style.setProperty('--accent-dim', isLight ? 'rgba(109, 40, 217, 0.1)' : 'rgba(167, 139, 250, 0.12)');
        root.style.setProperty('--accent-border', isLight ? 'rgba(109, 40, 217, 0.3)' : 'rgba(167, 139, 250, 0.28)');
      } else if (state.coin === 'SOL') {
        root.style.setProperty('--accent', isLight ? '#0f766e' : '#5eead4');
        root.style.setProperty('--accent-glow', isLight ? 'rgba(15, 118, 110, 0.25)' : 'rgba(94, 234, 212, 0.35)');
        root.style.setProperty('--accent-dim', isLight ? 'rgba(15, 118, 110, 0.1)' : 'rgba(94, 234, 212, 0.12)');
        root.style.setProperty('--accent-border', isLight ? 'rgba(15, 118, 110, 0.3)' : 'rgba(94, 234, 212, 0.28)');
      } else if (state.coin === 'LTC') {
        root.style.setProperty('--accent', isLight ? '#52525b' : '#a1a1aa');
        root.style.setProperty('--accent-glow', isLight ? 'rgba(82, 82, 91, 0.25)' : 'rgba(161, 161, 170, 0.35)');
        root.style.setProperty('--accent-dim', isLight ? 'rgba(82, 82, 91, 0.1)' : 'rgba(161, 161, 170, 0.12)');
        root.style.setProperty('--accent-border', isLight ? 'rgba(82, 82, 91, 0.3)' : 'rgba(161, 161, 170, 0.28)');
      } else {
        root.style.setProperty('--accent', isLight ? '#d97706' : '#f59e0b');
        root.style.setProperty('--accent-glow', isLight ? 'rgba(217, 119, 6, 0.28)' : 'rgba(245, 158, 11, 0.35)');
        root.style.setProperty('--accent-dim', isLight ? 'rgba(217, 119, 6, 0.1)' : 'rgba(245, 158, 11, 0.12)');
        root.style.setProperty('--accent-border', isLight ? 'rgba(217, 119, 6, 0.32)' : 'rgba(245, 158, 11, 0.28)');
      }

      fetchPrices();
    }

    function recalculateFrom(source) {
      if(!state.priceFiat) return;

      if (source === 'coin') {
        let val = parseNum(elements.inputCoin.value);
        if(val === 0 && !elements.inputCoin.value) {
           elements.inputSats.value = ''; elements.inputUsd.value = ''; return;
        }
        let btcVal = val * state.priceBtc;
        let satsVal = btcVal * 100000000;
        let fiatVal = val * state.priceFiat;

        elements.inputSats.value = formatNum(satsVal, 0);
        elements.inputUsd.value = formatNum(fiatVal, 4);
      }
      else if (source === 'sats') {
        let val = parseNum(elements.inputSats.value);
        if(val === 0 && !elements.inputSats.value) {
           elements.inputCoin.value = ''; elements.inputUsd.value = ''; return;
        }
        let btcVal = val / 100000000;
        let coinVal = btcVal / state.priceBtc;
        let fiatVal = coinVal * state.priceFiat;

        elements.inputCoin.value = formatNum(coinVal, 8);
        elements.inputUsd.value = formatNum(fiatVal, 4);
      }
      else if (source === 'fiat') {
        let val = parseNum(elements.inputUsd.value);
        if(val === 0 && !elements.inputUsd.value) {
           elements.inputCoin.value = ''; elements.inputSats.value = ''; return;
        }
        let coinVal = val / state.priceFiat;
        let btcVal = coinVal * state.priceBtc;
        let satsVal = btcVal * 100000000;

        elements.inputCoin.value = formatNum(coinVal, 8);
        elements.inputSats.value = formatNum(satsVal, 0);
      }
    }

    function setupEventListeners() {
      // Inputs
      elements.inputCoin.addEventListener('input', (e) => recalculateFrom('coin'));
      elements.inputSats.addEventListener('input', (e) => recalculateFrom('sats'));
      elements.inputUsd.addEventListener('input', (e) => recalculateFrom('fiat'));

      // Clean on focus
      [elements.inputCoin, elements.inputSats, elements.inputUsd].forEach(input => {
        input.addEventListener('focus', () => {
           if(input.value) {
               input.value = input.value.replace(/,/g, '');
           }
        });
        input.addEventListener('blur', () => {
           recalculateFrom(input.id.replace('input-', ''));
        });
      });

      // Copy on click of labels/symbols
      document.querySelectorAll('.input-wrapper').forEach(wrapper => {
        wrapper.addEventListener('dblclick', () => {
           const input = wrapper.querySelector('input');
           if(input.value) {
               navigator.clipboard.writeText(input.value.replace(/,/g, ''));
               showToast();
           }
        });
      });
    }

    function showToast() {
      elements.toast.classList.add('show');
      if (navigator.vibrate) navigator.vibrate(50);
      setTimeout(() => {
        elements.toast.classList.remove('show');
      }, 2000);
    }

    // Fallback if PWA script fails
    setTimeout(() => {
        if(!elements.coinPrice.innerText || elements.coinPrice.innerText === "Loading...") {
            window.initSbcUi();
        }
    }, 1000);
  </script>
</body>
</html>
