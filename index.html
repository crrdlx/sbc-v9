  <script>
    const state = {
      coin: 'BTC',
      fiat: 'USD',
      priceFiat: 0,
      priceBtc: 1,
      isFetching: false
    };

    const coinSymbols = { BTC: "฿", ETH: "Ξ", LTC: "Ł", XRP: "ꭓ", SOL: "◎", DOGE: "Ð" };
    const fiatSymbols = { USD: "$", GBP: "£", EUR: "€", CAD: "C$", AUD: "A$", INR: "₹", JPY: "¥", KRW: "₩", CHF: "CHF" };

    const geckoIds = {
      BTC: "bitcoin", ETH: "ethereum", LTC: "litecoin", XRP: "ripple",
      SOL: "solana", DOGE: "dogecoin", ADA: "cardano", DOT: "polkadot",
      AVAX: "avalanche-2", MATIC: "matic-network", LINK: "chainlink",
      UNI: "uniswap", ATOM: "cosmos", BCH: "bitcoin-cash", TRX: "tron"
    };
    const toGeckoId = (ticker) => geckoIds[ticker] || ticker.toLowerCase();

    // UI Elements
    const elements = {
      inputCoin: document.getElementById('input-coin'),
      inputSats: document.getElementById('input-sats'),
      inputUsd: document.getElementById('input-usd'),
      coinPrice: document.getElementById('coinPrice'),
      satsPerDollar: document.getElementById('satsPerDollar'),
      coinLabel: document.getElementById('coinLabel'),
      fiatLabel: document.getElementById('fiatLabel'),
      coinSymbolDisplay: document.getElementById('coinSymbolDisplay'),
      fiatSymbolDisplay: document.getElementById('fiatSymbolDisplay'),
      tickerName: document.getElementById('tickerName'),
      toast: document.getElementById('toast'),
    };

    const parseNum = (str) => {
        if(!str) return 0;
        let cleaned = str.toString().replace(/,/g, '');
        if(cleaned.match(/[a-zA-Z]/)) return 0;
        let val = parseFloat(cleaned);
        return isNaN(val) ? 0 : val;
    };

    const formatNum = (num, decimals) => {
      if(num === 0) return "";
      return new Intl.NumberFormat('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      }).format(num);
    };

    const priceDisplayDecimals = (price, coin) => {
      if (coin === 'BTC') return 2;
      if (price >= 1) return 2;
      if (price >= 0.01) return 4;
      return 6;
    };

    const forceUppercase = (input) => {
      const start = input.selectionStart;
      const end = input.selectionEnd;
      input.value = input.value.toUpperCase();
      input.setSelectionRange(start, end);
    };

    let priceInterval = null;

    window.initSbcUi = function () {
      handleCoinChange();
      setupEventListeners();

      if (priceInterval) clearInterval(priceInterval);
      priceInterval = setInterval(fetchPrices, 60000); // Auto update every 1 minute
    };

    async function forceFetchPrices() {
      const btn = document.getElementById('refreshBtn');
      if (btn) btn.classList.add('spinning');

      await fetchPrices();

      if (btn) btn.classList.remove('spinning');
      if (priceInterval) clearInterval(priceInterval);
      priceInterval = setInterval(fetchPrices, 60000);
    }

    async function fetchPrices() {
      if(state.isFetching) return;
      state.isFetching = true;
      elements.coinPrice.style.opacity = '0.5';

      try {
        const coinId = toGeckoId(state.coin);
        const vs = state.fiat.toLowerCase();
        const ids = state.coin === 'BTC' ? 'bitcoin' : `${coinId},bitcoin`;
        const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=${vs},btc`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const coinData = data[coinId];
        if (!coinData) { elements.coinPrice.innerText = "API Error"; return; }

        state.priceFiat = parseFloat(coinData[vs]) || 0;
        state.priceBtc  = state.coin === 'BTC' ? 1 : (parseFloat(coinData['btc']) || 0);

        const priceDecimals = priceDisplayDecimals(state.priceFiat, state.coin);
        elements.coinPrice.innerText = `${fiatSymbols[state.fiat]||''}${formatNum(state.priceFiat, priceDecimals)}`;

        if(state.priceBtc > 0 && state.priceFiat > 0) {
          const btcPrice = state.coin === 'BTC' ? state.priceFiat : (parseFloat(data['bitcoin']?.[vs]) || 0);
          const satsPerFiat = btcPrice > 0 ? Math.round(100000000 / btcPrice) : 0;
          if (satsPerFiat > 0) {
            elements.satsPerDollar.innerText = `${satsPerFiat.toLocaleString()} sats per ${fiatSymbols[state.fiat]||''}1`;
            elements.satsPerDollar.style.display = 'block';
          } else {
            elements.satsPerDollar.style.display = 'none';
          }
        } else {
          elements.satsPerDollar.style.display = 'none';
        }

        recalculateFrom('coin');
        smUpdateIfVisible();
      } catch (err) {
        console.error(err);
        elements.coinPrice.innerText = "Network Error";
      } finally {
        state.isFetching = false;
        elements.coinPrice.style.opacity = '1';
      }
    }

    function handleCoinChange() {
      const customCoin = document.getElementById('customCoin').value.trim().toUpperCase();
      const customFiat = document.getElementById('customFiat').value.trim().toUpperCase();

      state.coin = customCoin || document.getElementById('altcoin').value;
      state.fiat = customFiat || document.getElementById('fiat').value;

      document.getElementById('customCoin').value = customCoin;
      document.getElementById('customFiat').value = customFiat;

      elements.coinLabel.innerText = state.coin;
      elements.fiatLabel.innerText = state.fiat;
      elements.coinSymbolDisplay.innerText = coinSymbols[state.coin] || '';
      elements.fiatSymbolDisplay.innerText = fiatSymbols[state.fiat] || '';
      elements.tickerName.innerText = state.coin;

      // Update theme colors (gray cypherpunk accents per asset)
      const root = document.documentElement;
      const isLight = root.getAttribute('data-theme') === 'light';
      if (state.coin === 'ETH') {
        root.style.setProperty('--accent', isLight ? '#6d28d9' : '#a78bfa');
        root.style.setProperty('--accent-glow', isLight ? 'rgba(109, 40, 217, 0.25)' : 'rgba(167, 139, 250, 0.35)');
        root.style.setProperty('--accent-dim', isLight ? 'rgba(109, 40, 217, 0.1)' : 'rgba(167, 139, 250, 0.12)');
        root.style.setProperty('--accent-border', isLight ? 'rgba(109, 40, 217, 0.3)' : 'rgba(167, 139, 250, 0.28)');
      } else if (state.coin === 'SOL') {
        root.style.setProperty('--accent', isLight ? '#0f766e' : '#5eead4');
        root.style.setProperty('--accent-glow', isLight ? 'rgba(15, 118, 110, 0.25)' : 'rgba(94, 234, 212, 0.35)');
        root.style.setProperty('--accent-dim', isLight ? 'rgba(15, 118, 110, 0.1)' : 'rgba(94, 234, 212, 0.12)');
        root.style.setProperty('--accent-border', isLight ? 'rgba(15, 118, 110, 0.3)' : 'rgba(94, 234, 212, 0.28)');
      } else if (state.coin === 'LTC') {
        root.style.setProperty('--accent', isLight ? '#52525b' : '#a1a1aa');
        root.style.setProperty('--accent-glow', isLight ? 'rgba(82, 82, 91, 0.25)' : 'rgba(161, 161, 170, 0.35)');
        root.style.setProperty('--accent-dim', isLight ? 'rgba(82, 82, 91, 0.1)' : 'rgba(161, 161, 170, 0.12)');
        root.style.setProperty('--accent-border', isLight ? 'rgba(82, 82, 91, 0.3)' : 'rgba(161, 161, 170, 0.28)');
      } else {
        root.style.setProperty('--accent', isLight ? '#d97706' : '#f59e0b');
        root.style.setProperty('--accent-glow', isLight ? 'rgba(217, 119, 6, 0.28)' : 'rgba(245, 158, 11, 0.35)');
        root.style.setProperty('--accent-dim', isLight ? 'rgba(217, 119, 6, 0.1)' : 'rgba(245, 158, 11, 0.12)');
        root.style.setProperty('--accent-border', isLight ? 'rgba(217, 119, 6, 0.32)' : 'rgba(245, 158, 11, 0.28)');
      }

      fetchPrices();
    }

    function recalculateFrom(source) {
      if(!state.priceFiat) return;

      if (source === 'coin') {
        let val = parseNum(elements.inputCoin.value);
        if(val === 0 && !elements.inputCoin.value) {
           elements.inputSats.value = ''; elements.inputUsd.value = ''; return;
        }
        let btcVal = val * state.priceBtc;
        let satsVal = btcVal * 100000000;
        let fiatVal = val * state.priceFiat;

        elements.inputSats.value = formatNum(satsVal, 0);
        elements.inputUsd.value = formatNum(fiatVal, 4);
      }
      else if (source === 'sats') {
        let val = parseNum(elements.inputSats.value);
        if(val === 0 && !elements.inputSats.value) {
           elements.inputCoin.value = ''; elements.inputUsd.value = ''; return;
        }
        let btcVal = val / 100000000;
        let coinVal = btcVal / state.priceBtc;
        let fiatVal = coinVal * state.priceFiat;

        elements.inputCoin.value = formatNum(coinVal, 8);
        elements.inputUsd.value = formatNum(fiatVal, 4);
      }
      else if (source === 'fiat') {
        let val = parseNum(elements.inputUsd.value);
        if(val === 0 && !elements.inputUsd.value) {
           elements.inputCoin.value = ''; elements.inputSats.value = ''; return;
        }
        let coinVal = val / state.priceFiat;
        let btcVal = coinVal * state.priceBtc;
        let satsVal = btcVal * 100000000;

        elements.inputCoin.value = formatNum(coinVal, 8);
        elements.inputSats.value = formatNum(satsVal, 0);
      }
    }

    function setupEventListeners() {
      const customCoin = document.getElementById('customCoin');
      const customFiat = document.getElementById('customFiat');
      customCoin.addEventListener('input', () => forceUppercase(customCoin));
      customFiat.addEventListener('input', () => forceUppercase(customFiat));

      // Inputs
      elements.inputCoin.addEventListener('input', (e) => { recalculateFrom('coin'); smUpdateIfVisible(); });
      elements.inputSats.addEventListener('input', (e) => { recalculateFrom('sats'); smUpdateIfVisible(); });
      elements.inputUsd.addEventListener('input', (e) => { recalculateFrom('fiat'); smUpdateIfVisible(); });

      // Clean on focus
      [elements.inputCoin, elements.inputSats, elements.inputUsd].forEach(input => {
        input.addEventListener('focus', () => {
           if(input.value) {
               input.value = input.value.replace(/,/g, '');
           }
        });
        input.addEventListener('blur', () => {
           const src = input.id.replace('input-', '');
           recalculateFrom(src);
           // Reformat the source field itself with commas on blur
           if (src === 'sats') {
             const v = parseNum(input.value);
             if (v) input.value = formatNum(v, 0);
           } else if (src === 'coin') {
             const v = parseNum(input.value);
             if (v) input.value = formatNum(v, 8);
           } else if (src === 'usd') {
             const v = parseNum(input.value);
             if (v) input.value = formatNum(v, 4);
           }
           smUpdateIfVisible();
        });
      });

      // SM input listeners (bidirectional)
      smElements.inputCoin.addEventListener('input', () => smRecalculateFrom('coin'));
      smElements.inputSats.addEventListener('input', () => smRecalculateFrom('sats'));
      smElements.inputUsd.addEventListener('input',  () => smRecalculateFrom('usd'));

      [smElements.inputCoin, smElements.inputSats, smElements.inputUsd].forEach(input => {
        input.addEventListener('focus', () => {
          if (input.value) input.value = input.value.replace(/,/g, '');
        });
        input.addEventListener('blur', () => {
          const src = input.id.replace('sm-input-', '');
          smRecalculateFrom(src === 'usd' ? 'usd' : src);
          if (src === 'sats') { const v = parseNum(input.value); if (v) input.value = formatNum(v, 0); }
          else if (src === 'coin') { const v = parseNum(input.value); if (v) input.value = formatNum(v, 8); }
          else if (src === 'usd')  { const v = parseNum(input.value); if (v) input.value = formatNum(v, 4); }
        });
      });

      // Copy on click of labels/symbols
      document.querySelectorAll('.input-wrapper').forEach(wrapper => {
        wrapper.addEventListener('dblclick', () => {
           const input = wrapper.querySelector('input');
           if(input.value) {
               navigator.clipboard.writeText(input.value.replace(/,/g, ''));
               showToast();
           }
        });
      });
    }

    function showToast() {
      elements.toast.classList.add('show');
      if (navigator.vibrate) navigator.vibrate(50);
      setTimeout(() => {
        elements.toast.classList.remove('show');
      }, 2000);
    }

    // ── Split Mode ────────────────────────────────────────────────────────
    const smState = {
      coin: 'ETH',
      fiat: 'EUR',
      priceFiat: 0,
      priceBtc: 0,
      isFetching: false
    };

    const smElements = {
      inputCoin: document.getElementById('sm-input-coin'),
      inputSats: document.getElementById('sm-input-sats'),
      inputUsd:  document.getElementById('sm-input-usd'),
      coinPrice: document.getElementById('sm-coinPrice'),
      coinLabel: document.getElementById('sm-coinLabel'),
      fiatLabel: document.getElementById('sm-fiatLabel'),
      coinSymbolDisplay: document.getElementById('sm-coinSymbolDisplay'),
      fiatSymbolDisplay: document.getElementById('sm-fiatSymbolDisplay'),
      tickerName: document.getElementById('sm-tickerName'),
    };

    let smVisible = false;
    let smPriceInterval = null;

    function toggleSplitMode() {
      smVisible = !smVisible;
      const card = document.getElementById('smCard');
      const btn  = document.getElementById('splitModeBtn');
      const div  = document.getElementById('smDivider');
      card.style.display = smVisible ? 'block' : 'none';
      div.style.display  = smVisible ? 'flex'  : 'none';
      btn.classList.toggle('active', smVisible);
      if (smVisible) {
        // Ensure SM inputs are fully interactive when card opens
        ['sm-input-coin','sm-input-sats','sm-input-usd'].forEach(id => {
          const el = document.getElementById(id);
          if (el) { el.removeAttribute('readonly'); el.removeAttribute('disabled'); }
        });
        handleSmCoinChange();
        if (smPriceInterval) clearInterval(smPriceInterval);
        setTimeout(() => { fetchSmPrices(); }, 1500);
        smPriceInterval = setInterval(fetchSmPrices, 60000);
      } else {
        if (smPriceInterval) clearInterval(smPriceInterval);
      }
    }

    function handleSmCoinChange() {
      const customCoin = document.getElementById('sm-customCoin').value.trim().toUpperCase();
      const customFiat = document.getElementById('sm-customFiat').value.trim().toUpperCase();
      smState.coin = customCoin || document.getElementById('sm-altcoin').value;
      smState.fiat = customFiat || document.getElementById('sm-fiat').value;
      smElements.coinLabel.innerText = smState.coin;
      smElements.fiatLabel.innerText = smState.fiat;
      smElements.coinSymbolDisplay.innerText = coinSymbols[smState.coin] || '';
      smElements.fiatSymbolDisplay.innerText = fiatSymbols[smState.fiat] || '';
      smElements.tickerName.innerText = smState.coin;
      setTimeout(() => { fetchSmPrices(); }, 300);
    }

    async function fetchSmPrices() {
      if (smState.isFetching) return;
      smState.isFetching = true;
      try {
        const coinId = toGeckoId(smState.coin);
        const vs = smState.fiat.toLowerCase();
        const ids = smState.coin === 'BTC' ? 'bitcoin' : `${coinId},bitcoin`;
        const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=${vs},btc`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const coinData = data[coinId];
        if (!coinData) { smElements.coinPrice.innerText = 'API Error'; return; }
        smState.priceFiat = parseFloat(coinData[vs]) || 0;
        smState.priceBtc  = smState.coin === 'BTC' ? 1 : (parseFloat(coinData['btc']) || 0);
        const dec = priceDisplayDecimals(smState.priceFiat, smState.coin);
        smElements.coinPrice.innerText = (fiatSymbols[smState.fiat]||'') + formatNum(smState.priceFiat, dec);
        smRecalculateFromSats();
      } catch(e) {
        console.error('SM fetch error:', e);
        smElements.coinPrice.innerText = 'Network Error';
      } finally {
        smState.isFetching = false;
      }
    }

    // Called whenever top screen changes — bridge is always SATS
    function smRecalculateFromSats() {
      if (!smState.priceBtc || !smState.priceFiat) return;
      const sats = parseNum(elements.inputSats.value);
      if (!sats && !elements.inputSats.value) {
        smElements.inputCoin.value = '';
        smElements.inputSats.value = '';
        smElements.inputUsd.value  = '';
        return;
      }
      const btcVal  = sats / 100000000;
      const coinVal = btcVal / smState.priceBtc;
      const fiatVal = coinVal * smState.priceFiat;
      smElements.inputSats.value = formatNum(sats, 0);
      smElements.inputCoin.value = formatNum(coinVal, 8);
      smElements.inputUsd.value  = formatNum(fiatVal, 4);
    }

    // SM → Top screen: convert SM value to sats, push to top, recalc top
    function smRecalculateFrom(source) {
      if (!smState.priceBtc || !smState.priceFiat) return;
      let sats = 0;

      if (source === 'coin') {
        const val = parseNum(smElements.inputCoin.value);
        if (!val && !smElements.inputCoin.value) {
          smElements.inputSats.value = ''; smElements.inputUsd.value = '';
          elements.inputCoin.value = ''; elements.inputSats.value = ''; elements.inputUsd.value = '';
          return;
        }
        const btcVal = val * smState.priceBtc;
        sats = btcVal * 100000000;
        smElements.inputSats.value = formatNum(sats, 0);
        smElements.inputUsd.value  = formatNum(val * smState.priceFiat, 4);
      } else if (source === 'sats') {
        const val = parseNum(smElements.inputSats.value);
        if (!val && !smElements.inputSats.value) {
          smElements.inputCoin.value = ''; smElements.inputUsd.value = '';
          elements.inputCoin.value = ''; elements.inputSats.value = ''; elements.inputUsd.value = '';
          return;
        }
        sats = val;
        const btcVal  = sats / 100000000;
        const coinVal = btcVal / smState.priceBtc;
        smElements.inputCoin.value = formatNum(coinVal, 8);
        smElements.inputUsd.value  = formatNum(coinVal * smState.priceFiat, 4);
      } else if (source === 'usd') {
        const val = parseNum(smElements.inputUsd.value);
        if (!val && !smElements.inputUsd.value) {
          smElements.inputCoin.value = ''; smElements.inputSats.value = '';
          elements.inputCoin.value = ''; elements.inputSats.value = ''; elements.inputUsd.value = '';
          return;
        }
        const coinVal = val / smState.priceFiat;
        const btcVal  = coinVal * smState.priceBtc;
        sats = btcVal * 100000000;
        smElements.inputCoin.value = formatNum(coinVal, 8);
        smElements.inputSats.value = formatNum(sats, 0);
      }

      // Push sats up to top screen and recalculate it
      if (sats > 0 && state.priceBtc && state.priceFiat) {
        const btcVal  = sats / 100000000;
        const coinVal = btcVal / state.priceBtc;
        const fiatVal = coinVal * state.priceFiat;
        elements.inputSats.value = formatNum(sats, 0);
        elements.inputCoin.value = formatNum(coinVal, 8);
        elements.inputUsd.value  = formatNum(fiatVal, 4);
      }
    }

    // Hook SM update into the existing event listeners instead of patching recalculateFrom
    function smUpdateIfVisible() {
      if (smVisible) smRecalculateFromSats();
    }

    // Fallback if PWA script fails
    setTimeout(() => {
        if(!elements.coinPrice.innerText || elements.coinPrice.innerText === "Loading...") {
            window.initSbcUi();
        }
    }, 1000);
  </script>
</body>
</html>
