<!-- version 9.0.2 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Satoshi Bitcoin Converter v9</title>
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="description" content="Convert between Bitcoin, altcoins, satoshis, and fiat currencies like USD, GBP, and more.">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <script src="config.js"></script>
  <script src="src/App.js"></script>
  <script src="src/main.js"></script>

  <link rel="stylesheet" href="src/style.css">
  <style>
    :root {
      /* Dark Theme Variables (Default) */
      --bg-main: #121212;
      --card-bg: #1e1e1e;
      --card-border: #333333;
      --input-bg: #141414;
      --input-inner: #000000;
      --text-main: #e2e8f0;
      --text-muted: #888888;
      --accent: #f59e0b;
      --success: #34d399;
      --btn-bg: #333333;
    }

    [data-theme="light"] {
      /* Traditional SBC Gray Theme Variables */
      --bg-main: #f0f0f0;
      --card-bg: #ffffff;
      --card-border: #d1d5db;
      --input-bg: #f9fafb;
      --input-inner: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --accent: #d97706;
      --success: #059669;
      --btn-bg: #e5e7eb;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Space Grotesk', sans-serif;
      transition: background-color 0.2s ease;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 1rem;
      max-width: 500px;
      margin: 0 auto;
    }

    header h1 a {
      color: var(--text-main);
      font-weight: 700;
      letter-spacing: -1px;
    }

    .theme-toggle {
      background: var(--btn-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .glass-card {
      background: var(--card-bg) !important;
      border: 1px solid var(--card-border) !important;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important;
      border-radius: 12px !important;
      padding: 1.5rem;
      transition: background-color 0.2s ease;
    }

    .selector-row { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; }
    .select-group { flex: 1; display: flex; flex-direction: column; gap: 0.25rem; }
    .select-group label { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }

    select, input[type="text"] {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      font-family: 'JetBrains Mono', monospace;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    select:focus, input[type="text"]:focus { border-color: var(--accent); }

    .converter-row { margin-bottom: 1.25rem; }
    .converter-row label { font-size: 0.8rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; display: flex; justify-content: space-between; margin-bottom: 0.25rem; }

    .input-wrapper { position: relative; }
    .symbol-prefix { position: absolute; left: 1rem; font-size: 1.1rem; color: var(--accent); pointer-events: none; top: 50%; transform: translateY(-50%); }

    .converter-row input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem !important;
      padding: 0.75rem 1rem 0.75rem 2.5rem !important;
      background: var(--input-inner) !important;
      border: 1px solid var(--card-border) !important;
      border-radius: 8px !important;
      width: 100%;
      box-sizing: border-box;
      color: var(--text-main) !important;
    }

    .unit-badge { background: var(--btn-bg); color: var(--text-main); border-radius: 4px; padding: 2px 6px; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; }

    .price-ticker {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .price-ticker p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.75rem; }

    .live-price {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.8rem;
      background: var(--input-inner) !important;
      border: 2px solid var(--accent) !important;
      border-radius: 12px !important;
      color: var(--accent);
      padding: 0.5rem 1.5rem !important;
      display: inline-block;
      margin-bottom: 0.5rem;
    }

    .sats-per-dollar {
      width: 100%;
      margin-top: 1rem;
      background: var(--input-bg) !important;
      border: 1px solid var(--success) !important;
      color: var(--success) !important;
      font-family: 'JetBrains Mono', monospace;
      border-radius: 8px !important;
      padding: 0.75rem;
      font-weight: 600;
      opacity: 0.9;
    }

    .refresh-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.5rem;
      display: flex;
      margin: 0.5rem auto;
    }

    .footer-links { text-align: center; margin-top: 2rem; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
    .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; }
    .footer-links a:hover { color: var(--text-main); }

    .custom-inputs { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .custom-inputs input { width: 100%; }

    @media (max-width: 480px) { .glass-card { padding: 1.25rem; } }
  </style>
</head>

<body onload="init()">
  <header>
    <h1><a href="index.html" style="text-decoration:none">シ Satoshi Bitcoin Converter</a></h1>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">Light Mode</button>
  </header>

  <main>
    <div class="glass-card" id="mainCard" style="max-width: 500px; margin: 0 auto;">
      <div class="selector-row">
        <div class="select-group">
          <label>Asset</label>
          <select id="altcoin" onchange="handleCoinChange()">
            <option value="BTC" selected>฿ Bitcoin (BTC)</option>
            <option value="ETH">Ξ Ethereum (ETH)</option>
            <option value="LTC">Ł Litecoin (LTC)</option>
            <option value="XRP">ꭓ Ripple (XRP)</option>
            <option value="SOL">◎ Solana (SOL)</option>
          </select>
          <div class="custom-inputs">
             <input type="text" id="customCoin" placeholder="Ticker (e.g. DOGE)" onchange="handleCoinChange()">
          </div>
        </div>

        <div class="select-group">
          <label>Fiat Currency</label>
          <select id="fiat" onchange="handleCoinChange()">
            <option value="USD" selected>$ USD</option>
            <option value="GBP">£ GBP</option>
            <option value="EUR">€ EUR</option>
            <option value="CAD">C$ CAD</option>
            <option value="AUD">A$ AUD</option>
            <option value="JPY">¥ JPY</option>
          </select>
           <div class="custom-inputs">
             <input type="text" id="customFiat" placeholder="Fiat (e.g. CHF)" onchange="handleCoinChange()">
          </div>
        </div>
      </div>

      <div class="converter-row">
        <label>Crypto Amount <span id="coinLabel" class="unit-badge">BTC</span></label>
        <div class="input-wrapper">
          <span class="symbol-prefix" id="coinSymbolDisplay">฿</span>
          <input type="text" id="input-coin" inputmode="decimal" autocomplete="off" placeholder="0.00">
        </div>
      </div>

      <div class="converter-row">
        <label>Satoshi Equivalent <span class="unit-badge">SATS</span></label>
        <div class="input-wrapper">
          <span class="symbol-prefix">シ</span>
          <input type="text" id="input-sats" inputmode="numeric" autocomplete="off" placeholder="0">
        </div>
      </div>

      <div class="converter-row">
        <label>Fiat Value <span id="fiatLabel" class="unit-badge">USD</span></label>
        <div class="input-wrapper">
          <span class="symbol-prefix" id="fiatSymbolDisplay">$</span>
          <input type="text" id="input-usd" inputmode="decimal" autocomplete="off" placeholder="0.00">
        </div>
      </div>

      <div class="price-ticker">
        <p>Current <span id="tickerName">Bitcoin</span> Price</p>
        <div class="live-price" id="coinPrice">Loading...</div>
        <div>
          <button id="refreshBtn" onclick="forceFetchPrices()" class="refresh-btn" aria-label="Refresh price" title="Refresh Price">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          </button>
        </div>
        <div class="sats-per-dollar" id="satsPerDollar" style="display: none;">-- sats per $1</div>
      </div>
    </div>

    <div class="footer-links">
      <a href="pages/about.html">About</a>
      <a href="pages/satoshiday.html">Satoshi Day</a>
      <a href="pages/dev_notes.html">Dev Notes</a>
      <a href="pages/grow.html">Grow</a>
      <a href="pages/tips.html">Tip Jar 😃</a>
    </div>

    <div style="text-align:center; margin-top:2rem; font-size:0.85rem; color:var(--text-muted); font-weight:600;">SBC-v9.0.2</div>
  </main>

  <script>
    // Theme Logic
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('theme-toggle');
      if (html.getAttribute('data-theme') === 'light') {
        html.removeAttribute('data-theme');
        btn.innerText = 'Light Mode';
        localStorage.setItem('theme', 'dark');
      } else {
        html.setAttribute('data-theme', 'light');
        btn.innerText = 'Dark Mode';
        localStorage.setItem('theme', 'light');
      }
    }

    // Initialize Theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      document.getElementById('theme-toggle').innerText = 'Dark Mode';
    }

    const state = {
      coin: 'BTC',
      fiat: 'USD',
      priceFiat: 0,
      priceBtc: 1,
      isFetching: false
    };

    const coinSymbols = { BTC: "฿", ETH: "Ξ", LTC: "Ł", XRP: "ꭓ", SOL: "◎", DOGE: "Ð" };
    const fiatSymbols = { USD: "$", GBP: "£", EUR: "€", CAD: "C$", AUD: "A$", INR: "₹", JPY: "¥", KRW: "₩", CHF: "CHF" };

    const elements = {
      inputCoin: document.getElementById('input-coin'),
      inputSats: document.getElementById('input-sats'),
      inputUsd: document.getElementById('input-usd'),
      coinPrice: document.getElementById('coinPrice'),
      satsPerDollar: document.getElementById('satsPerDollar'),
      coinLabel: document.getElementById('coinLabel'),
      fiatLabel: document.getElementById('fiatLabel'),
      coinSymbolDisplay: document.getElementById('coinSymbolDisplay'),
      fiatSymbolDisplay: document.getElementById('fiatSymbolDisplay'),
      tickerName: document.getElementById('tickerName')
    };

    const parseNum = (str) => {
        if(!str) return 0;
        let cleaned = str.toString().replace(/,/g, '');
        let val = parseFloat(cleaned);
        return isNaN(val) ? 0 : val;
    };

    const formatNum = (num, decimals) => {
      if(num === 0) return "";
      return new Intl.NumberFormat('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      }).format(num);
    };

    let priceInterval = null;

    window.initSbcUi = function () {
      handleCoinChange();
      setupEventListeners();
      if (priceInterval) clearInterval(priceInterval);
      priceInterval = setInterval(fetchPrices, 60000);
    };

    async function forceFetchPrices() {
      const btn = document.getElementById('refreshBtn');
      if (btn) btn.classList.add('spinning');
      await fetchPrices();
      if (btn) btn.classList.remove('spinning');
    }

    async function fetchPrices() {
      if(state.isFetching) return;
      state.isFetching = true;
      elements.coinPrice.style.opacity = '0.5';
      try {
        const res = await fetch(`https://min-api.cryptocompare.com/data/price?fsym=${state.coin}&tsyms=${state.fiat},BTC`);
        const data = await res.json();
        state.priceFiat = parseFloat(data[state.fiat]) || 0;
        state.priceBtc = parseFloat(data["BTC"]) || (state.coin === "BTC" ? 1 : 0);
        elements.coinPrice.innerText = `${fiatSymbols[state.fiat]||''}${formatNum(state.priceFiat, 2)}`;
        if(state.priceBtc > 0 && state.priceFiat > 0) {
            let satsPerFiat = (1 / state.priceFiat) * state.priceBtc * 100000000;
            elements.satsPerDollar.innerText = `${Math.round(satsPerFiat).toLocaleString()} sats per ${fiatSymbols[state.fiat]||''}1`;
            elements.satsPerDollar.style.display = 'block';
        }
        recalculateFrom('coin');
      } catch (err) {
        elements.coinPrice.innerText = "Error";
      } finally {
        state.isFetching = false;
        elements.coinPrice.style.opacity = '1';
      }
    }

    function handleCoinChange() {
      const customCoin = document.getElementById('customCoin').value.trim().toUpperCase();
      const customFiat = document.getElementById('customFiat').value.trim().toUpperCase();
      state.coin = customCoin || document.getElementById('altcoin').value;
      state.fiat = customFiat || document.getElementById('fiat').value;
      elements.coinLabel.innerText = state.coin;
      elements.fiatLabel.innerText = state.fiat;
      elements.coinSymbolDisplay.innerText = coinSymbols[state.coin] || '';
      elements.fiatSymbolDisplay.innerText = fiatSymbols[state.fiat] || '';
      elements.tickerName.innerText = state.coin;
      fetchPrices();
    }

    function recalculateFrom(source) {
      if(!state.priceFiat) return;
      if (source === 'coin') {
        let val = parseNum(elements.inputCoin.value);
        let satsVal = val * state.priceBtc * 100000000;
        let fiatVal = val * state.priceFiat;
        elements.inputSats.value = formatNum(satsVal, 0);
        elements.inputUsd.value = formatNum(fiatVal, 2);
      } else if (source === 'sats') {
        let val = parseNum(elements.inputSats.value);
        let coinVal = (val / 100000000) / state.priceBtc;
        elements.inputCoin.value = formatNum(coinVal, 8);
        elements.inputUsd.value = formatNum(coinVal * state.priceFiat, 2);
      } else if (source === 'fiat') {
        let val = parseNum(elements.inputUsd.value);
        let coinVal = val / state.priceFiat;
        elements.inputCoin.value = formatNum(coinVal, 8);
        elements.inputSats.value = formatNum(coinVal * state.priceBtc * 100000000, 0);
      }
    }

    function setupEventListeners() {
      elements.inputCoin.addEventListener('input', () => recalculateFrom('coin'));
      elements.inputSats.addEventListener('input', () => recalculateFrom('sats'));
      elements.inputUsd.addEventListener('input', () => recalculateFrom('fiat'));
    }

    setTimeout(() => { window.initSbcUi(); }, 500);
  </script>
</body>
</html>
